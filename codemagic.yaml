workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    integrations:
      app_store_connect: "THAI STAT Admin_CI" # เปลี่ยนเป็นชื่อที่คุณตั้งในหน้า Integrations
    environment:
      flutter: 3.16.2
      xcode: latest
      groups:
        - apple_auth
    scripts:
      - name: Set up code signing settings on Codemagic
        script: | 
          keychain initialize
          # 1. โหลดใบรับรองทั้ง 2 แบบ (ต้องใช้ทั้งคู่ Xcode ถึงจะยอมให้ผ่าน)
          app-store-connect fetch-signing-files "th.go.nso.ThaiStatNso2019" --type IOS_APP_DEVELOPMENT --create
          app-store-connect fetch-signing-files "th.go.nso.ThaiStatNso2019" --type IOS_APP_STORE --create
          keychain add-certificates
          # 2. ล้างค่า Team ID เดิมและบังคับปิด Automatic Signing (เพื่อไม่ให้ Xcode ถามหา Apple ID บุคคล)
          sed -i '' 's/DEVELOPMENT_TEAM = HTYHCF93L8;//g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          # 3. แมตช์ใบรับรองเข้ากับโปรเจกต์
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build ipa
        script: |
          # 4. Build และเลือกใบรับรองแบบ App Store เพื่อส่งขึ้น Store
          flutter build ipa --release --export-method app-store
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
