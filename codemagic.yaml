workflows:
  ios-release-workflow:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "THAI STAT Admin_CI"
    environment:
      flutter: 3.16.2
      xcode: latest
    scripts:
      - name: Initialize Keychain and Fetch Signing Files
        script: | 
          keychain initialize
          # Fetch matching profiles and certificates. 
          # Use --create to ensure Codemagic creates what is missing.
          app-store-connect fetch-signing-files "th.go.nso.ThaiStatNso2019" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build unsigned IPA
        script: |
          # Build without signing to bypass Xcode's internal profile checks
          flutter build ipa --release --no-codesign --build-number=$BUILD_NUMBER
      - name: Sign IPA with Codemagic
        script: |
          # Sign the generated archive using the fetched certificates and profiles
          # This tool is more robust than Xcode's internal signing logic
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
