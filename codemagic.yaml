workflows:
  ios-release-workflow:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "THAI STAT Admin_CI"
    environment:
      flutter: 3.16.2
      xcode: latest
      groups:
        - app_store_credentials
    scripts:
      - name: Set up code signing settings on Codemagic
        script: | 
          keychain initialize
          app-store-connect fetch-signing-files "th.go.nso.ThaiStatNso2019" --type IOS_APP_DEVELOPMENT --create
          app-store-connect fetch-signing-files "th.go.nso.ThaiStatNso2019" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build xcarchive (No Signing)
        script: |
          # สร้างไฟล์แอปโดยไม่ต้องเช็คใบรับรองในขั้นตอนนี้ เพื่อข้ามปัญหา Xcode roadblock
          flutter build ipa --release --no-codesign
      - name: Export and Sign IPA with Codemagic
        script: |
          # ใช้เครื่องมือ Codemagic เซ็นชื่อทับลงไปโดยตรง
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
