workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    integrations:
      app_store_connect: "THAI STAT Admin_CI" # เปลี่ยนเป็นชื่อที่คุณตั้งในหน้า Integrations
    environment:
      flutter: 3.16.2
      xcode: latest
      groups:
        - apple_auth
    scripts:
      - name: Set up code signing settings on Codemagic
        script: | 
          keychain initialize
          # ดึงใบรับรองสำหรับส่ง App Store มาเตรียมไว้
          app-store-connect fetch-signing-files "th.go.nso.ThaiStatNso2019" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build Flutter XCArchive (No Signing)
        script: |
          # สร้างแอปแบบดิบๆ โดยไม่ต้องตรวจใบรับรอง (ขั้นตอนนี้จะผ่านแน่นอน)
          flutter build ipa --release --no-codesign
      - name: Build and Sign IPA with Codemagic Tools
        script: |
          # นำไฟล์ดิบมาเซ็นชื่อด้วยใบรับรองที่เราดึงมา โดยไม่ผ่านระบบ Automatic ของ Xcode
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
