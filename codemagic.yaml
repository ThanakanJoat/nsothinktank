workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    integrations:
      app_store_connect: "THAI STAT App Manager" # เปลี่ยนเป็นชื่อที่คุณตั้งในหน้า Integrations
    environment:
      flutter: 3.16.2
      xcode: latest
      groups:
        - apple_auth
    scripts:
      - name: Set up code signing settings on Codemagic
        script: | 
          keychain initialize
          # Fetch both profiles
          app-store-connect fetch-signing-files "th.go.nso.ThaiStatNso2019" --type IOS_APP_DEVELOPMENT --create
          app-store-connect fetch-signing-files "th.go.nso.ThaiStatNso2019" --type IOS_APP_STORE --create
          keychain add-certificates
          # Automatically map profiles to the project
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build ipa
        script: |
          # Build and sign in one go using the profiles mapped by Codemagic
          flutter build ipa --release --export-method app-store
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
