workflows:
  ios-release-workflow:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "THAI STAT Admin_CI"
    environment:
      flutter: 3.16.2
      xcode: latest
    scripts:
      - name: Set up code signing
        script: | 
          # ไม่ต้องใช้สคริปต์ fetch อีกต่อไป เพราะคุณตั้งค่าในหน้าเว็บ (Provisioning Profiles) เรียบร้อยแล้ว
          keychain initialize
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build ipa
        script: |
          # Build ด้วยวิธีที่ Codemagic จะหยิบใบรับรองจากหน้าเว็บมาใช้โดยตรง
          flutter build ipa --release --export-method app-store
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
