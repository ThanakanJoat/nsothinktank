workflows:
  ios-release-workflow:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "THAI STAT Admin_CI"
    environment:
      flutter: 3.16.2
      xcode: latest
    scripts:
      - name: Set up code signing from UI
        script: | 
          # สคริปต์นี้มีแค่นี้พอครับ คือการบอกว่า "ให้เอาโปรไฟล์ที่ตั้งในหน้าเว็บมาใช้"
          keychain initialize
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build ipa
        script: |
          # ใช้เลข Build จากหน้าเว็บ และส่งออกตามวิธีที่คุณตั้งไว้
          flutter build ipa --release --export-method app-store --build-number=$BUILD_NUMBER
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
