workflows:
  ios-release-workflow:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "THAI STAT Admin_CI"
    environment:
      flutter: 3.16.2
      xcode: latest
    scripts:
      - name: Set up code signing
        script: | 
          keychain initialize
          # ใช้คำสั่งเดียวสั้นๆ เพื่อดึงค่า "สีเขียว" จากหน้าเว็บมาลุยเลยครับ
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build ipa
        script: |
          # Build ด้วยคำสั่งมาตรฐาน เลข Build จะรันอัตโนมัติจากหน้าเว็บ
          flutter build ipa --release --export-method app-store --build-number=$BUILD_NUMBER
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
