workflows:
  ios-release-workflow:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "THAI STAT Admin_CI"
    environment:
      flutter: 3.16.2
      xcode: latest
    scripts:
      - name: Set up code signing from UI
        script: | 
          keychain initialize
          # ดึงโปรไฟล์ "สีเขียว" จากหน้าเว็บที่คุณตั้งค่าไว้
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build ipa
        script: |
          # เพิ่มตัวเลือก --codesign-identity เพื่อบอก Flutter ว่า "ไม่ต้องไปหา Development ให้ใช้ Apple Distribution เท่านั้น"
          flutter build ipa --release \
            --export-method app-store \
            --build-number=$BUILD_NUMBER \
            --codesign-identity="Apple Distribution"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
