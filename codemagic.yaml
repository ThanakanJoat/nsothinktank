workflows:
  ios-release-workflow:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "THAI STAT Admin_CI"
    environment:
      flutter: 3.16.2
      xcode: latest
    scripts:
      - name: Pre-build setup (Signing & Deps)
        script: | 
          keychain initialize
          # คำสั่งนี้จะดึงโปรไฟล์ที่คุณทำให้มัน "เขียว" ในหน้าเว็บมาเตรียมไว้ครับ
          xcode-project use-profiles
          flutter packages pub get
      - name: Build Unsigned Archive
        script: |
          # สร้างแอปแบบไม่เซ็นชื่อ เพื่อข้าม Roadblock ของ Xcode ขั้นตอนนี้จะผ่านแน่นอน
          flutter build ipa --release --no-codesign --build-number=$BUILD_NUMBER
      - name: Sign and Export IPA
        script: |
          # ใช้เครื่องมือของ Codemagic เซ็นชื่อทับลงในไฟล์ที่ได้จากขั้นตอนก่อนหน้า
          # วิธีนี้จะใช้โปรไฟล์ที่ "เขียว" ในหน้าเว็บมาแปะให้โดยตรง
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
