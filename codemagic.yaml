workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    integrations:
      app_store_connect: "THAI STAT App Manager" # เปลี่ยนเป็นชื่อที่คุณตั้งในหน้า Integrations
    environment:
      flutter: 3.16.2
      xcode: latest
      groups:
        - apple_auth
    scripts:
      - name: Set up code signing settings on Codemagic
        script: | 
          keychain initialize
          # ใช้คำสั่ง fetch พร้อมสั่งให้ save ลงเครื่อง cloud และสร้างใหม่ถ้าจำเป็น
          app-store-connect fetch-signing-files "th.go.nso.ThaiStatNso2019" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build xcarchive
        script: |
          # Build เป็น Archive โดยไม่ต้องเซ็นชื่อ (เพื่อตัดปัญหา Xcode ถามหา Apple ID)
          flutter build ipa --release --no-codesign
      - name: Xcode build ipa (Sign and Export)
        script: |
          # ใช้คำสั่งพิเศษของ Codemagic ในการ "เซ็นชื่อทับ" และสร้างไฟล์ IPA 
          # โดยระบุ Bundle ID ให้ชัดเจนเพื่อให้ระบบเลือกใบรับรองได้ถูกต้อง
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --bundle-id "th.go.nso.ThaiStatNso2019"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
