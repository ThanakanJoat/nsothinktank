workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    integrations:
      app_store_connect: "THAI STAT Admin_CI" # เปลี่ยนเป็นชื่อที่คุณตั้งในหน้า Integrations
    environment:
      flutter: 3.16.2
      xcode: latest
      groups:
        - apple_auth
    scripts:
      - name: Set up code signing settings on Codemagic
        script: | 
          keychain initialize
          # ดึงใบรับรองและโปรไฟล์มาเตรียมไว้ (ถ้ากุญแจหาย ระบบจะพยายามจัดการในขั้นตอนนี้)
          app-store-connect fetch-signing-files "th.go.nso.ThaiStatNso2019" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build xcarchive (No Signing)
        script: |
          # สร้างแอปแบบดิบๆ โดยไม่เซ็นชื่อ (เพื่อตัดปัญหา Xcode ถามหา Apple ID)
          flutter build ipa --release --no-codesign
      - name: Export and Sign IPA with Codemagic
        script: |
          # ใช้เครื่องมือของ Codemagic เซ็นชื่อทับลงไปในไฟล์ที่ได้จากขั้นตอนก่อนหน้า
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
