workflows:
  ios-release-workflow:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "THAI STAT Admin_CI"
    environment:
      flutter: 3.16.2
      xcode: latest
    scripts:
      - name: Set up code signing
        script: | 
          keychain initialize
          # 1. ดึงโปรไฟล์ "สีเขียว" จากหน้าเว็บมาลงเครื่อง
          xcode-project use-profiles

          # 2. ปรับแต่งโปรเจกต์ Xcode ให้ยอมใช้โปรไฟล์แบบ Manual ที่เราเตรียมไว้
          # (ขั้นตอนนี้สำคัญมาก เพื่อข้ามปัญหา No development certificates)
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "Apple Distribution";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY\[sdk=iphoneos\*\] = "iPhone Developer";/CODE_SIGN_IDENTITY = "Apple Distribution";/g' ios/Runner.xcodeproj/project.pbxproj
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build IPA (Final Version)
        script: |
          # ใช้คำสั่งมาตรฐาน แต่เจาะจงให้ข้ามขั้นตอนการเซ็นชื่อของ Xcode 
          # แล้วให้ Codemagic จัดการแปะใบรับรองให้เองในตัว
          flutter build ipa --release \
            --export-method app-store \
            --build-number=$BUILD_NUMBER \
            --no-codesign
            
          # ขั้นตอนนี้จะหยิบเอาไฟล์จากหน้าเว็บมาเซ็นทับลงไปอย่างถูกต้อง
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
